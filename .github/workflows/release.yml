# Build and Release

on:
  push:
    branches:
      - 'unstable'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 'stable'
          cache-dependency-path: "**/*.sum"

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Resolve NDK and Build Tools versions
        id: vars
        run: |
          # Read NDK version from build.gradle.kts or use a fallback
          NDK_VERSION=$(grep "ndkVersion =" app/build.gradle.kts | sed -E 's/.*"([^"]+)".*/\1/' || echo "29.0.14206865")
          # Read Compile SDK (matches build tools) from gradle.properties
          BUILD_TOOLS=$(grep "project.compileSdk=" gradle.properties | cut -d'=' -f2 || echo "36")
          
          echo "ndk_version=$NDK_VERSION" >> $GITHUB_OUTPUT
          echo "build_tools=$BUILD_TOOLS.0.0" >> $GITHUB_OUTPUT
          
          # Add sdkmanager to PATH
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/tools/bin" >> $GITHUB_PATH

      - name: Cache NDK
        uses: actions/cache@v5
        id: ndk_cache
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ steps.vars.outputs.ndk_version }}
          key: ndk-${{ steps.vars.outputs.ndk_version }}

      - name: Install NDK and Build Tools
        run: |
          yes | sdkmanager "ndk;${{ steps.vars.outputs.ndk_version }}" "build-tools;${{ steps.vars.outputs.build_tools }}"

      - name: Install native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nasm yasm build-essential python3 pkg-config autoconf automake libtool

      - name: Cache FFmpeg Binaries
        uses: actions/cache@v5
        id: ffmpeg_cache
        with:
          path: |
            app/src/main/jniLibs/*/libffmpeg.so
            app/src/main/jniLibs/*/libav*.so
            app/src/main/jniLibs/*/libsw*.so
            app/src/main/jniLibs/*/libpostproc.so
          key: ${{ runner.os }}-ffmpeg-${{ steps.vars.outputs.ndk_version }}-${{ hashFiles('build.sh', 'external/ffmpeg-android-maker/**') }}

      - name: Cache Native Binaries (Go/C)
        uses: actions/cache@v5
        id: native_cache
        with:
          path: |
            app/src/main/jniLibs/*/libolcrtc.so
            app/src/main/jniLibs/*/libxray.so
            app/src/main/jniLibs/*/libturnable.so
            app/src/main/jniLibs/*/libhevsocks5.so
          key: ${{ runner.os }}-native-${{ steps.vars.outputs.ndk_version }}-${{ hashFiles('build.sh', 'external/olcrtc/**', 'external/vless-client/**', 'external/turnable/**', 'external/hev-socks5-tunnel/**') }}

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleRelease -Pandroid.ndkVersion=${{ steps.vars.outputs.ndk_version }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: ${{ steps.vars.outputs.build_tools }}

      - name: Clean up and Rename APKs
        run: |
          mkdir -p final_apks
          
          find app/build/outputs/apk/release -name "*-signed.apk" | while read -r file; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" | sed 's/-signed//')
              cp "$file" "final_apks/$filename"
              echo "Prepared signed file: $filename"
            fi
          done
          
          if [ -z "$(ls -A final_apks)" ]; then
            echo "ERROR: No signed APKs were found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v7
        with:
          name: wireturn-release-apk
          path: final_apks/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: final_apks/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean Old Unstable Assets
        if: github.ref == 'refs/heads/unstable'
        run: |
          # Only try to clean if the release exists
          if gh release view unstable-latest >/dev/null 2>&1; then
            gh release view unstable-latest --json assets -q '.assets[].name' | while read -r asset; do
              gh release delete-asset unstable-latest "$asset" -y
            done
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Unstable Release
        uses: softprops/action-gh-release@v3
        if: github.ref == 'refs/heads/unstable'
        with:
          tag_name: unstable-latest
          name: "Unstable Build (Development)"
          body: "Latest build from unstable branch. Commit: ${{ github.sha }}"
          files: final_apks/*.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

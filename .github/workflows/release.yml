name: Build and Release

on:
  push:
    branches:
      - 'unstable'
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 'stable'
          cache-dependency-path: "**/*.sum"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Resolve latest NDK version
        id: ndk_version
        run: |
          # Add sdkmanager to PATH
          echo "${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/tools/bin" >> $GITHUB_PATH
          export PATH="${ANDROID_HOME}/cmdline-tools/latest/bin:${ANDROID_HOME}/tools/bin:$PATH"

          # Resolve latest NDK version
          PKG=$(sdkmanager --list | grep -oP 'ndk;[\d\.]+' | sort -Vu | tail -1)
          if [ -z "$PKG" ]; then
            echo "Error: Could not resolve NDK package."
            exit 1
          fi
          VERSION=$(echo $PKG | cut -d';' -f2)
          echo "pkg=$PKG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Cache NDK
        uses: actions/cache@v4
        id: ndk_cache
        with:
          path: ${{ env.ANDROID_HOME }}/ndk/${{ steps.ndk_version.outputs.version }}
          key: ndk-${{ steps.ndk_version.outputs.version }}

      - name: Install latest NDK
        if: steps.ndk_cache.outputs.cache-hit != 'true'
        run: yes | sdkmanager "${{ steps.ndk_version.outputs.pkg }}"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        # Передаем версию NDK в проект
        run: ./gradlew assembleRelease -Pandroid.ndkVersion=${{ steps.ndk_version.outputs.version }}

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "36.0.0"

      - name: Clean up and Rename APKs
        run: |
          mkdir -p final_apks
          
          find app/build/outputs/apk/release -name "*-signed.apk" | while read -r file; do
            if [ -f "$file" ]; then
              filename=$(basename "$file" | sed 's/-signed//')
              cp "$file" "final_apks/$filename"
              echo "Prepared signed file: $filename"
            fi
          done
          
          if [ -z "$(ls -A final_apks)" ]; then
            echo "ERROR: No signed APKs were found!"
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: wireturn-release-apk
          path: final_apks/*.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: final_apks/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean Old Unstable Assets
        if: github.ref == 'refs/heads/unstable'
        run: |
          gh release view unstable-latest --json assets -q '.assets[].name' | while read -r asset; do
            gh release delete-asset unstable-latest "$asset" -y
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Unstable Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/unstable'
        with:
          tag_name: unstable-latest
          name: "Unstable Build (Development)"
          body: "Latest build from unstable branch. Commit: ${{ github.sha }}"
          files: final_apks/*.apk
          prerelease: true
          make_latest: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
